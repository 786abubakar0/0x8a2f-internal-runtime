name: Daily History Purge

on:
  schedule:
    # 22:00 UTC is 03:00 AM PKT
    - cron: '0 22 * * *'
  workflow_dispatch: # Allows you to run it manually for testing

permissions:
  contents: write

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reset Git History
        run: |
          git config --global user.name "System-Bot"
          git config --global user.email "actions@github.com"
          
          # 1. Create a temporary 'orphan' branch (no history)
          git checkout --orphan latest_branch
          
          # 2. Add all current files (your scripts and latest CSVs)
          git add -A
          
          # 3. Commit them as the 'new' starting point
          git commit -m "Daily Cleanup: Fresh Start $(date)"
          
          # 4. Delete the old bloated master branch
          git branch -D master
          
          # 5. Rename the current branch to master
          git branch -m master
          
          # 6. Force push to overwrite the history on GitHub
          git push origin master --force
